<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎛 FritzenLab Weather Station</title>

  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; color:#333; text-align:center; }
    header { background:#47a135; color:white; padding:1rem; font-size:1.5rem; }
    .card { background:white; margin:1rem auto; padding:1.2rem; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); max-width:400px; font-size:1.3rem; }
    .chart-card { background:white; margin:1rem auto; padding:1.2rem; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); max-width:800px; }
    .label { font-weight:600; color:#2c3e50; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>🎛 FritzenLab Weather Station</header>

<div class="card"><span class="label">Temperature:</span> <span id="temp">--</span> °C</div>
<div class="card"><span class="label">Humidity:</span> <span id="hum">--</span> %</div>
<div class="card"><span class="label">Light:</span> <span id="ldr">--</span> %</div>
<div class="card"><span class="label">ECO2:</span> <span id="eco2">--</span> ppm</div>

<div class="chart-card">
  <canvas id="tempChart"></canvas>
</div>

<script>
const feeds = {
  temp: "https://io.adafruit.com/api/v2/clovisf/feeds/temperaturereadings",
  hum: "https://io.adafruit.com/api/v2/clovisf/feeds/humidityreadings",
  ldr: "https://io.adafruit.com/api/v2/clovisf/feeds/ldrreadings",
  eco2: "https://io.adafruit.com/api/v2/clovisf/feeds/eco2readings"
};

const ctx = document.getElementById('tempChart').getContext('2d');

const tempChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Temp (°C)', data: [], borderColor: '#47a135', yAxisID: 'y', tension: 0.3 },
      { label: 'Humidity (%)', data: [], borderColor: '#00A2E8', yAxisID: 'y1', tension: 0.3 },
      { label: 'Light (%)', data: [], borderColor: '#f1c40f', yAxisID: 'y1', tension: 0.3 },
      { label: 'eCO2 (ppm)', data: [], borderColor: '#e74c3c', yAxisID: 'y2', tension: 0.3 }
    ]
  },
  options: {
    responsive: true,
    scales: {
      y:  { type: 'linear', position: 'left',  title: { display: true, text: 'Temp °C' }},
      y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: '%' }},
      y2: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'ppm' }}
    }
  }
});

async function loadHistory() {
  try {
    const limit = 144;

    const [tempRes, humRes, ldrRes, eco2Res] = await Promise.all([
      fetch(`${feeds.temp}/data?limit=${limit}`),
      fetch(`${feeds.hum}/data?limit=${limit}`),
      fetch(`${feeds.ldr}/data?limit=${limit}`),
      fetch(`${feeds.eco2}/data?limit=${limit}`)
    ]);

    const tempData = await tempRes.json();
    const humData  = await humRes.json();
    const ldrData  = await ldrRes.json();
    const eco2Data = await eco2Res.json();

    tempData.reverse();
    humData.reverse();
    ldrData.reverse();
    eco2Data.reverse();

    tempData.forEach((point, i) => {
      const time = new Date(point.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      tempChart.data.labels.push(time);
      tempChart.data.datasets[0].data.push(parseFloat(point.value));
      tempChart.data.datasets[1].data.push(humData[i]  ? parseFloat(humData[i].value)  : null);
      tempChart.data.datasets[2].data.push(ldrData[i]  ? parseFloat(ldrData[i].value)  : null);
      tempChart.data.datasets[3].data.push(eco2Data[i] ? parseFloat(eco2Data[i].value) : null);
    });

    tempChart.update();

  } catch (err) {
    console.error("History fetch failed", err);
  }
}

async function fetchFeed(id, url) {
  try {
    const response = await fetch(url);
    const data = await response.json();

    document.getElementById(id).innerText = data.last_value;

    if (id === 'eco2') {
      tempChart.data.datasets[3].data.push(parseFloat(data.last_value));
      if (tempChart.data.datasets[3].data.length > 144) tempChart.data.datasets[3].data.shift();
      tempChart.update();
    }

  } catch (err) {
    console.error(err);
  }
}

function updateAllFeeds() {
  for (const [id, url] of Object.entries(feeds)) {
    fetchFeed(id, url);
  }
}

loadHistory().then(() => {
  updateAllFeeds();
  setInterval(updateAllFeeds, 300000);
});
</script>

</body>
</html>
