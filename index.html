<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#x1F39B; FritzenLab Weather Station</title>
  <link rel="icon" type="image/png" sizes="192x192" href="fritzenlab-icon.png">
  <link rel="apple-touch-icon" href="fritzenlab-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#47a135">
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; color:#333; text-align:center; }
    header { background:#47a135; color:white; padding:1rem; font-size:1.5rem; font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif; text-align:center; }
    .card { background:white; margin:1rem auto; padding:1.2rem; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); max-width:400px; font-size:1.3rem; }
    .label { font-weight:600; color:#2c3e50; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>&#x1F39B; FritzenLab Weather Station</header>

  <div class="card"><span class="label">Temperature:</span> <span id="temp">--</span> °C</div>
  <div class="card"><span class="label">Humidity:</span> <span id="hum">--</span> %</div>
  <div class="card"><span class="label">Light:</span> <span id="ldr">--</span> %</div>
  <div class="card"><span class="label">ECO2:</span> <span id="eco2">--</span> ppm</div>
  <div class="card" style="max-width: 600px;">
    <canvas id="tempChart"></canvas>
  </div>
  <script>
    // Public feed URLs (no API key needed if feeds are public)
    const feeds = {
      temp: "https://io.adafruit.com/api/v2/clovisf/feeds/temperaturereadings/data?limit=12",
      hum: "https://io.adafruit.com/api/v2/clovisf/feeds/humidityreadings",
      ldr: "https://io.adafruit.com/api/v2/clovisf/feeds/ldrreadings",
      eco2: "https://io.adafruit.com/api/v2/clovisf/feeds/eco2readings"
    };

    async function fetchFeed(id, url) {
      try {
        const response = await fetch(url);
        const data = await response.json();
        document.getElementById(id).innerText = data.last_value;
      } catch (err) {
        console.error("Error fetching", id, err);
      }
    }

    function updateAllFeeds() {
      for (const [id, url] of Object.entries(feeds)) {
        fetchFeed(id, url);
      }
    }

    // Fetch immediately when page loads
    updateAllFeeds();

    // Refresh every 30 seconds
    setInterval(updateAllFeeds, 60000);
	
		// Initialize Chart
	const ctx = document.getElementById('tempChart').getContext('2d');
	const tempChart = new Chart(ctx, {
		type: 'line',
		data: { labels: [], datasets: [{ label: 'Temp (°C)', data: [], borderColor: '#47a135', tension: 0.3 }] },
		options: { scales: { y: { beginAtZero: false } } }
	});

	// NEW: Function to load the last 60 mins of history
	async function loadHistory() {
		try {
			// Fetch last 12 points (60 mins / 5 min intervals)
			const response = await fetch(`${feeds.temp}/data?limit=12`);
			const history = await response.json();

			// Adafruit returns newest first, so we reverse it for the chart
			history.reverse().forEach(point => {
				const time = new Date(point.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
				tempChart.data.labels.push(time);
				tempChart.data.datasets[0].data.push(parseFloat(point.value));
			});

			tempChart.update();
		} catch (err) {
			console.error("History fetch failed", err);
		}
	}

	async function fetchFeed(id, url) {
		try {
			const response = await fetch(url);
			const data = await response.json();
			document.getElementById(id).innerText = data.last_value;

			// Only push new live points if the chart already has data
			if (id === 'temp' && tempChart.data.labels.length > 0) {
				const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
				// Prevent duplicate points if the fetch hits before the ESP32 sends new data
				if (tempChart.data.labels[tempChart.data.labels.length - 1] !== now) {
					tempChart.data.labels.push(now);
					tempChart.data.datasets[0].data.push(parseFloat(data.last_value));
					if (tempChart.data.labels.length > 12) {
						tempChart.data.labels.shift();
						tempChart.data.datasets[0].data.shift();
					}
					tempChart.update();
				}
			}
		} catch (err) { console.error(err); }
	}

	function updateAllFeeds() {
		for (const [id, url] of Object.entries(feeds)) { fetchFeed(id, url); }
	}

	// ON STARTUP:
	loadHistory().then(() => {
		updateAllFeeds(); // Get current values for the text cards
		setInterval(updateAllFeeds, 60000); // Set refresh interval
	});
		
	}
  </script>
</body>
</html>
